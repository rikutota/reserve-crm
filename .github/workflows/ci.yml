name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  build:
    name: 型チェック・ビルド
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://reserve_crm:reserve_crm_password@localhost:5432/reserve_crm?schema=public
      AUTH_SECRET: dummy_auth_secret_for_ci_dummy_auth_secret_for_ci
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpmをセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: Prisma Clientを生成
        run: pnpm prisma generate

      - name: Prisma schemaを検証
        run: pnpm prisma validate

      - name: 型チェック
        run: pnpm exec tsc --noEmit

      - name: ビルド
        run: pnpm build
